name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "*" ]

jobs:
  build:

    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6.0.2
    - name: Use Node.js 22.x
      uses: actions/setup-node@v6.3.0
      with:
        node-version: 24.14.1
        cache: 'npm'
    - run: npm ci
    - run: npm run lint
    - run: npm test
